[tools]
rust = "latest"

[tasks.test]
description = "Run tests"
run = "cargo test --all"

[tasks.coverage]
description = "Run tests with code coverage"
run = "cargo llvm-cov --all-features"

# Build Rust components
[tasks.build]
description = "Build platform-specific Rust components"
sources = ["crates"]
run = "cargo build -p anymount --release"
outputs = ["target/**"]

# Run the app
[tasks.cli]
alias = "anymount"
description = "Run the application"
depends = ["build"]
usage = 'arg "[args]" var=#true double_dash="required" help="Arguments and flags forwarded to anymount-cli (use -- before flags)"'
run = "target/release/anymount-cli ${usage_args-}"
run_windows = 'target\\release\\anymount-cli.exe{% for arg in usage.args | default(value=[]) %} {{ arg }}{% endfor %}'

[tasks.tui]
description = "Run the terminal user interface"
depends = ["build"]
run = "target/release/anymount-cli"
run_windows = "target\\release\\anymount-cli.exe"
