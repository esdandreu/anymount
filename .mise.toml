[tools]
rust = "latest"

[tasks.test]
description = "Run tests"
run = "cargo test --all"

[tasks.coverage]
description = "Run tests with code coverage"
run = "cargo llvm-cov --all-features"

# Build Rust components
[tasks.build]
description = "Build platform-specific Rust components"
sources = ["crates"]
run = "cargo build -p anymount --release"
outputs = ["target/**"]

# Run the app
[tasks.cli]
alias = "anymount"
description = "Run the application"
depends = ["build"]
usage = 'arg "[args]" var=#true double_dash="required" help="Arguments and flags forwarded to anymount-cli (use -- before flags)"'
run = "target/release/anymount-cli ${usage_args-}"
run_windows = 'target\\release\\anymount-cli.exe{% for arg in usage.args | default(value=[]) %} {{ arg }}{% endfor %}'

[tasks.tui]
description = "Run the terminal user interface"
depends = ["build"]
run = "target/release/anymount-cli"
run_windows = "target\\release\\anymount-cli.exe"

# OpenTelemetry Collector (Docker): OTLP → logs/otel/collector-logs.jsonl
[tasks.otel-collector]
description = "Run OTel Collector (contrib); OTLP gRPC :4317, HTTP :4318 → logs/otel/collector-logs.jsonl"
run = "mkdir -p logs/otel && docker run --rm --name anymount-otel-collector -p 4317:4317 -p 4318:4318 -v \"$PWD/devtools/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro\" -v \"$PWD/logs/otel:/out:rw\" otel/opentelemetry-collector-contrib:0.147.0 --config=/etc/otelcol-contrib/config.yaml"
run_windows = "if not exist logs\\otel mkdir logs\\otel && docker run --rm --name anymount-otel-collector -p 4317:4317 -p 4318:4318 -v \"%CD%\\devtools\\otel-collector\\config.yaml:/etc/otelcol-contrib/config.yaml:ro\" -v \"%CD%\\logs\\otel:/out:rw\" otel/opentelemetry-collector-contrib:0.147.0 --config=/etc/otelcol-contrib/config.yaml"
