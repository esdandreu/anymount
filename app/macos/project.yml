name: Anymount
options:
  bundleIdPrefix: com.anymount
  deploymentTarget:
    macOS: "11.0"

settings:
  SWIFT_VERSION: 5.0
  MACOSX_DEPLOYMENT_TARGET: 11.0

targets:
  Anymount:
    type: application
    platform: macOS
    sources:
      - path: MainApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anymount.app
      INFOPLIST_FILE: MainApp/Info.plist
      CODE_SIGN_STYLE: Automatic
      ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: FileProviderExtension
        embed: true
      - target: AnymountXPCService
        embed: true
    scheme:
      testTargets: []

  FileProviderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FileProviderExtension
        excludes:
          - "*.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anymount.app.fileprovider
      INFOPLIST_FILE: FileProviderExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: FileProviderExtension/FileProviderExtension.entitlements
      CODE_SIGN_STYLE: Automatic
      ENABLE_HARDENED_RUNTIME: YES
    scheme:
      testTargets: []

  AnymountXPCService:
    type: xpc-service
    platform: macOS
    sources:
      - path: XPCService
        excludes:
          - "*.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anymount.xpc
      INFOPLIST_FILE: XPCService/Info.plist
      CODE_SIGN_ENTITLEMENTS: XPCService/XPCService.entitlements
      CODE_SIGN_STYLE: Automatic
      ENABLE_HARDENED_RUNTIME: YES
      SWIFT_OBJC_BRIDGING_HEADER: XPCService/Bridging-Header.h
      HEADER_SEARCH_PATHS: 
        - $(PROJECT_DIR)/include
        - $(PROJECT_DIR)/../../include
      LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/../../target/release
      OTHER_LDFLAGS: 
        - -lanymount_macos
        - -framework Foundation
        - -framework System
    scheme:
      testTargets: []

schemes:
  Anymount:
    build:
      targets:
        Anymount: all
    run:
      config: Debug
    archive:
      config: Release

